services:
  app:
    build: .
    container_name: qrcode-php74
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: qrcode
      DB_USER: qrcode_user
      DB_PASSWORD: qrcode_pass
      APP_AUTH_USER: admin
      APP_AUTH_PASS: admin123
    depends_on:
      - db
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./public/generated:/app/public/generated
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: qrcode-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qrcode
      MYSQL_USER: qrcode_user
      MYSQL_PASSWORD: qrcode_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: qrcode-adminer
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data:
